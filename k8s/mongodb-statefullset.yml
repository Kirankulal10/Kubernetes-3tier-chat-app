apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-statefullset-pod
  namespace: chatapp-namespace
  labels:
    app: mongodb-statefullset
spec:
  serviceName: mongodb-service
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-statefullset
  template:
    metadata:
      labels:
        app: mongodb-statefullset  # has relation with staetfullset service 
    spec:
      containers:
      - name: chatapp-db
        image: mongo:latest
        ports:
        - containerPort: 27017

        env:
          - name: MONGO_INITDB_ROOT_USERNAME
            valueFrom:
              secretKeyRef:
                name:  chatapp-secrets
                key: mongodb_username

          - name: MONGO_INITDB_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name:  chatapp-secrets
                key: mongodb_password

        volumeMounts:
        - mountPath: /data/db
          name: mongodb-data-storage

      volumes:
      - name: mongodb-data-storage
        persistentVolumeClaim:
          claimName: mongodb-pvc


        
              
