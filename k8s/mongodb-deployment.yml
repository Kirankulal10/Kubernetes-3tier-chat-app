apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  namespace: chatapp-namespace
  labels:
    app: mongodb-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-pod
  template:
    metadata:
      labels:
        app: mongodb-pod
    spec:
      containers:
      - name: chatapp-db
        image: mongo:latest
        ports:
        - containerPort: 27017

        env:
          - name: MONGO_INITDB_ROOT_USERNAME
            value: root
          - name: MONGO_INITDB_ROOT_PASSWORD
            value: root

        volumeMounts:
        - mountPath: /data/db
          name: mongodb-data-storage

      volumes:
      - name: mongodb-data-storage
        persistentVolumeClaim:
          claimName: mongodb-pvc


        
              
