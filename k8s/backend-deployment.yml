apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: chatapp-namespace
  labels:
    app: backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-pod
  template:
    metadata:
      labels:
        app: backend-pod
    spec:
      containers:
      - name: chatapp-backend
        image: kirankulal/chatapp-backend:latest
        ports:
        - containerPort: 5001

        env:
        - name:  NODE_ENV
          value: "production"
        
        - name: PORT
          value: "5001"

        - name: MONGODB_URI
          value: "mongodb://root:root@mongodb-service:27017/chatApp?authSource=admin&retryWrites=true&w=majority"

        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: chatapp-secrets
              key: jwt
        
